<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileCompressor — Compressor Huffman Multimodal</title>
    <meta name="description" content="Compressor e descompactador de arquivos multimodal usando algoritmo de Huffman." />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7;
            color: #333;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 24px;
        }

        /* ── Mode Toggle ── */
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: #fff;
            color: #555;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.2s, background 0.2s;
        }

        .mode-btn.active {
            border-color: #2563eb;
            background: #eff6ff;
            color: #2563eb;
        }

        .mode-btn:not(.active):hover {
            border-color: #bbb;
        }

        /* ── Category Cards ── */
        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .category-card {
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fff;
        }

        .category-card:hover {
            border-color: #bbb;
        }

        .category-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .cat-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 4px;
        }

        .cat-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #333;
        }

        .cat-exts {
            font-size: 0.65rem;
            color: #999;
            margin-top: 2px;
        }

        /* ── Decompress notice ── */
        .decompress-info {
            display: none;
            text-align: center;
            padding: 16px;
            background: #f9fafb;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 20px;
            color: #555;
            font-size: 0.9rem;
        }

        /* ── File Input ── */
        .file-section {
            margin-bottom: 20px;
        }

        .file-drop-zone {
            border: 2px dashed #d0d0d0;
            border-radius: 6px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
            color: #888;
            font-size: 0.9rem;
        }

        .file-drop-zone:hover {
            border-color: #2563eb;
        }

        .file-drop-zone.has-file {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .file-name-display {
            display: none;
            margin-top: 6px;
            font-size: 0.85rem;
            color: #16a34a;
            font-weight: 500;
        }

        .file-input-hidden {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* ── Submit ── */
        .submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        /* ── Error ── */
        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            border-left: 3px solid #b91c1c;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            body { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FileCompressor</h1>
        <p class="subtitle">Compressão multimodal com algoritmo de Huffman</p>

        {% if error %}
        <div class="error" id="error-message">{{ error }}</div>
        {% endif %}

        <div class="card">
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button type="button" class="mode-btn active" id="mode-compress" onclick="setMode('compress')">
                    📦 Compactar
                </button>
                <button type="button" class="mode-btn" id="mode-decompress" onclick="setMode('decompress')">
                    📂 Descompactar
                </button>
            </div>

            <!-- Category Cards (compress mode) -->
            <div id="category-section">
                <div class="section-label">Tipo de arquivo</div>
                <div class="category-grid">
                    <div class="category-card selected" data-category="text" onclick="selectCategory('text')">
                        <span class="cat-icon">📝</span>
                        <div class="cat-name">Texto</div>
                        <div class="cat-exts">.txt .md .csv .json</div>
                    </div>
                    <div class="category-card" data-category="pdf" onclick="selectCategory('pdf')">
                        <span class="cat-icon">📄</span>
                        <div class="cat-name">PDF</div>
                        <div class="cat-exts">.pdf</div>
                    </div>
                    <div class="category-card" data-category="image" onclick="selectCategory('image')">
                        <span class="cat-icon">🖼️</span>
                        <div class="cat-name">Imagem</div>
                        <div class="cat-exts">.png .jpg .bmp</div>
                    </div>
                    <div class="category-card" data-category="audio" onclick="selectCategory('audio')">
                        <span class="cat-icon">🎵</span>
                        <div class="cat-name">Áudio</div>
                        <div class="cat-exts">.mp3 .wav .ogg</div>
                    </div>
                </div>
            </div>

            <!-- Decompress notice -->
            <div class="decompress-info" id="decompress-info">
                📂 Selecione um arquivo <strong>.huff</strong> para restaurar o original
            </div>

            <!-- Upload Form -->
            <form method="POST" action="/upload" enctype="multipart/form-data" id="upload-form">
                <input type="hidden" name="category" id="category-input" value="text" />

                <div class="file-section">
                    <div class="file-drop-zone" id="drop-zone">
                        Clique para selecionar um arquivo
                        <div class="file-name-display" id="file-name-display"></div>
                        <input type="file" name="file" id="file-input" class="file-input-hidden"
                               accept=".txt,.md,.csv,.log,.py,.json,.xml,.html" />
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Compactar</button>
            </form>
        </div>
    </div>

    <script>
        const CATEGORY_ACCEPTS = {
            text:  '.txt,.md,.csv,.log,.py,.json,.xml,.html',
            pdf:   '.pdf',
            image: '.png,.jpg,.jpeg,.bmp,.gif,.webp,.svg',
            audio: '.mp3,.wav,.ogg,.flac,.aac,.wma'
        };

        let currentMode = 'compress';
        let currentCategory = 'text';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-compress').classList.toggle('active', mode === 'compress');
            document.getElementById('mode-decompress').classList.toggle('active', mode === 'decompress');
            document.getElementById('category-section').style.display = mode === 'compress' ? 'block' : 'none';
            document.getElementById('decompress-info').style.display = mode === 'decompress' ? 'block' : 'none';

            const form = document.getElementById('upload-form');
            const fileInput = document.getElementById('file-input');
            const submitBtn = document.getElementById('submit-btn');

            form.action = mode === 'compress' ? '/upload' : '/decompress';
            fileInput.accept = mode === 'compress' ? CATEGORY_ACCEPTS[currentCategory] : '.huff';
            submitBtn.textContent = mode === 'compress' ? 'Compactar' : 'Descompactar';

            fileInput.value = '';
            document.getElementById('file-name-display').style.display = 'none';
            document.getElementById('drop-zone').classList.remove('has-file');
        }

        function selectCategory(category) {
            currentCategory = category;
            document.getElementById('category-input').value = category;
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));
            document.querySelector('[data-category="' + category + '"]').classList.add('selected');
            document.getElementById('file-input').accept = CATEGORY_ACCEPTS[category];
            document.getElementById('file-input').value = '';
            document.getElementById('file-name-display').style.display = 'none';
            document.getElementById('drop-zone').classList.remove('has-file');
        }

        document.getElementById('file-input').addEventListener('change', function() {
            var display = document.getElementById('file-name-display');
            var dropZone = document.getElementById('drop-zone');
            if (this.files.length > 0) {
                display.textContent = '✓ ' + this.files[0].name;
                display.style.display = 'block';
                dropZone.classList.add('has-file');
            } else {
                display.style.display = 'none';
                dropZone.classList.remove('has-file');
            }
        });
    </script>
</body>
</html>
